- name: Importing App setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app_setup.yaml

- name: Calling Java setup
  ansible.builtin.import_role:
    name: common
    tasks_from: java_setup.yaml

- name: Create {{ component }} service
  ansible.builtin.template:
    src: shipping.service.j2
    dest: /etc/systemd/system/shipping.service
  notify : Daemon reload

- name: Install Mysql
  ansible.builtin.dnf:
    name: mysql
    state: present

- name: Install python dependencies
  ansible.builtin.pip:
    name: "{{ item }}"
    state: present
  loop: 
  - PyMySQL
  - cryptography

- name: Check if cities database exists
  community.mysql.mysql_info:
    login_host: "{{ MYSQL_HOST }}"
    login_user: root
    login_password: "{{ MYSQL_PASSWORD }}"
    filter: databases
  register: db_check

- name: Load to mysql db
  community.mysql.mysql_db:
    name: cities
    state: import
    target: "{{ item }}"
    login_host: "{{ MYSQL_HOST }}"
    login_user: root
    login_password: "{{ MYSQL_PASSWORD }}"
  when: "'cities' not in db_check.databases"
  loop: 
  - /app/db/schema.sql
  - /app/db/app-user.sql
  - /app/db/master-data.sql
  notify: Restart service


    