- name: Install Maven
  ansible.builtin.dnf:
    name: maven
    state: present

- name: Create system user
  ansible.builtin.user:
    name: roboshop
    home: /app
    shell: /sbin/nologin
    system: yes

- name: Check app directory exists
  ansible.builtin.stat:
    path: /app
  register: st_output

- name: Remove existing app directory
  ansible.builtin.file:
    path: /app
    state: absent
  when: st_output.stat.exists

- name: Create App directory
  ansible.builtin.file:
    path: /app
    state: directory
    owner: roboshop

- name: Removing Existing zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: Downloading {{ component }} code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip

- name: Unarchive {{ component }} code
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes

- name: Maven build
  ansible.builtin.shell: mvn clean package 
  args:
    chdir: /app

- name: Rename Package
  ansible.builtin.copy:
    src: target/shipping-1.0.jar
    dest: shipping.jar
  args:
    chdir: /app

